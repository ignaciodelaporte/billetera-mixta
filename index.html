<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio Ignacio</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Cabinet+Grotesk:wght@400;500;700;800&display=swap');

  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --border: #1e1e2e;
    --accent: #00e5a0;
    --accent2: #f7b731;
    --accent3: #4f8ef7;
    --text: #e8e8f0;
    --muted: #5a5a78;
    --danger: #ff4757;
    --card: #14141f;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Cabinet Grotesk', sans-serif;
    min-height: 100vh;
    padding: 2rem 1rem;
  }

  body::before {
    content: '';
    position: fixed;
    top: -40%;
    left: -20%;
    width: 80vw;
    height: 80vw;
    background: radial-gradient(circle, rgba(0,229,160,0.04) 0%, transparent 65%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 720px;
    margin: 0 auto;
    position: relative;
    z-index: 1;
  }

  header {
    margin-bottom: 2.5rem;
  }

  .header-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
  }

  h1 {
    font-size: 2rem;
    font-weight: 800;
    letter-spacing: -0.04em;
    line-height: 1;
  }

  h1 span { color: var(--accent); }

  .timestamp {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    color: var(--muted);
    text-align: right;
    line-height: 1.6;
  }

  .rates-bar {
    display: flex;
    gap: 1.2rem;
    margin-top: 1rem;
    flex-wrap: wrap;
  }

  .rate-pill {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 0.3rem 0.8rem;
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    display: flex;
    align-items: center;
    gap: 0.4rem;
  }

  .rate-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .section {
    margin-bottom: 1.5rem;
  }

  .section-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 0.6rem;
    padding-left: 2px;
  }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }

  .row {
    display: grid;
    grid-template-columns: 1fr auto;
    align-items: center;
    padding: 0.85rem 1rem;
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
    gap: 1rem;
  }

  .row:last-child { border-bottom: none; }
  .row:hover { background: rgba(255,255,255,0.02); }

  .row-name {
    font-weight: 500;
    font-size: 0.92rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .row-name .badge {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    background: rgba(79,142,247,0.15);
    color: var(--accent3);
    border-radius: 4px;
    padding: 1px 5px;
  }

  .row-right {
    display: flex;
    align-items: center;
    gap: 0.6rem;
  }

  .amount-display {
    font-family: 'DM Mono', monospace;
    font-size: 0.95rem;
    color: var(--text);
    text-align: right;
  }

  .amount-sub {
    font-family: 'DM Mono', monospace;
    font-size: 0.68rem;
    color: var(--muted);
    text-align: right;
  }

  .edit-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 6px;
    width: 26px; height: 26px;
    cursor: pointer;
    font-size: 0.75rem;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    flex-shrink: 0;
  }

  .edit-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  /* Inline edit */
  .inline-edit {
    display: none;
    align-items: center;
    gap: 0.4rem;
  }

  .inline-edit.active { display: flex; }

  .inline-input {
    background: var(--surface);
    border: 1px solid var(--accent);
    color: var(--text);
    border-radius: 6px;
    padding: 0.3rem 0.5rem;
    font-family: 'DM Mono', monospace;
    font-size: 0.85rem;
    width: 130px;
    outline: none;
  }

  .save-btn {
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 6px;
    padding: 0.3rem 0.6rem;
    font-size: 0.75rem;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.15s;
  }

  .save-btn:hover { opacity: 0.85; }

  /* ETH row special */
  .eth-row {
    flex-direction: column;
    align-items: stretch;
  }

  .eth-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: 100%;
  }

  .eth-detail {
    font-family: 'DM Mono', monospace;
    font-size: 0.68rem;
    color: var(--muted);
    margin-top: 0.3rem;
    display: flex;
    gap: 1rem;
  }

  .eth-detail span { color: var(--accent2); }

  /* Totals */
  .totals-card {
    background: linear-gradient(135deg, rgba(0,229,160,0.06) 0%, rgba(79,142,247,0.04) 100%);
    border: 1px solid rgba(0,229,160,0.25);
    border-radius: 14px;
    padding: 1.2rem 1.2rem;
    margin-top: 1.5rem;
  }

  .totals-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.62rem;
    letter-spacing: 0.15em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 0.8rem;
  }

  .totals-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
  }

  .total-item {}

  .total-currency {
    font-family: 'DM Mono', monospace;
    font-size: 0.68rem;
    color: var(--muted);
    margin-bottom: 0.2rem;
  }

  .total-value {
    font-size: 1.6rem;
    font-weight: 800;
    letter-spacing: -0.04em;
    line-height: 1;
  }

  .total-value.pesos { color: var(--accent); }
  .total-value.dollars { color: var(--accent2); }

  .divider {
    width: 1px;
    background: var(--border);
    margin: 0 auto;
  }

  .refresh-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 8px;
    padding: 0.4rem 0.8rem;
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 0.4rem;
  }

  .refresh-btn:hover { border-color: var(--accent); color: var(--accent); }
  .refresh-btn.spinning svg { animation: spin 1s linear infinite; }

  @keyframes spin { to { transform: rotate(360deg); } }

  .error-msg {
    font-family: 'DM Mono', monospace;
    font-size: 0.68rem;
    color: var(--danger);
    margin-top: 0.5rem;
    display: none;
  }

  .loading-overlay {
    position: fixed; inset: 0;
    background: rgba(10,10,15,0.7);
    backdrop-filter: blur(4px);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    font-family: 'DM Mono', monospace;
    font-size: 0.85rem;
    color: var(--accent);
    letter-spacing: 0.1em;
    gap: 0.8rem;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }

  .loading-overlay.visible {
    opacity: 1;
    pointer-events: all;
  }

  .spinner {
    width: 18px; height: 18px;
    border: 2px solid rgba(0,229,160,0.2);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
</style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
  ACTUALIZANDO COTIZACIONES
</div>

<div class="container">
  <header>
    <div class="header-top">
      <h1>CASH<span>&</span><br>PORTFOLIO</h1>
      <div class="timestamp">
        <div id="updateTime">—</div>
        <button class="refresh-btn" id="refreshBtn" onclick="fetchRates()">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M23 4v6h-6M1 20v-6h6"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>
          REFRESH
        </button>
      </div>
    </div>
    <div class="rates-bar">
      <div class="rate-pill"><div class="rate-dot"></div>ETH <span id="ethRateDisplay">—</span></div>
      <div class="rate-pill"><div class="rate-dot" style="background:var(--accent2)"></div>USD MEP <span id="mepRateDisplay">—</span></div>
      <div class="rate-pill"><div class="rate-dot" style="background:var(--accent3)"></div>CCL <span id="cclRateDisplay">—</span></div>
    </div>
    <div class="error-msg" id="errorMsg">⚠ No se pudo obtener cotización en vivo. Usando valores anteriores.</div>
  </header>

  <!-- BILLETERAS -->
  <div class="section">
    <div class="section-label">Billeteras virtuales · ARS</div>
    <div class="card" id="walletSection">
      <!-- rows generadas por JS -->
    </div>
  </div>

  <!-- BROKERS -->
  <div class="section">
    <div class="section-label">Inversiones · Brokers</div>
    <div class="card" id="brokerSection">
    </div>
  </div>

  <!-- CRYPTO -->
  <div class="section">
    <div class="section-label">Crypto · Binance</div>
    <div class="card" id="cryptoSection">
    </div>
  </div>

  <!-- EFECTIVO -->
  <div class="section">
    <div class="section-label">Efectivo · Cash</div>
    <div class="card" id="efectivoSection">
    </div>
  </div>

  <!-- TOTALES -->
  <div class="totals-card">
    <div class="totals-label">Total consolidado</div>
    <div class="totals-grid">
      <div class="total-item">
        <div class="total-currency">PESOS ARGENTINOS</div>
        <div class="total-value pesos" id="totalARS">$ —</div>
      </div>
      <div class="total-item" style="text-align:right">
        <div class="total-currency">DÓLARES (MEP)</div>
        <div class="total-value dollars" id="totalUSD">u$s —</div>
      </div>
    </div>
  </div>
</div>

<script>
// ── STATE ──────────────────────────────────────────────────────────────────
const state = {
  wallets: [
    { id: 'galicia',     name: 'Galicia',      ars: 0 },
    { id: 'macro',       name: 'Macro',         ars: 0 },
    { id: 'brubank',     name: 'Brubank',       ars: 0 },
    { id: 'mercadopago', name: 'Mercado Pago',  ars: 0 },
  ],
  brokers: [
    { id: 'cocosapp', name: 'Cocosapp', ars: 0 },
    { id: 'ieb',      name: 'IEB+',     ars: 0 },
  ],
  eth: { amount: 0 },
  efectivo: { ars: 0, usd: 0 },
  rates: { ethUsd: null, mepArs: null, cclArs: null }
};

// Load from localStorage
function loadState() {
  try {
    const saved = localStorage.getItem('portfolio_ignacio_v2');
    if (saved) {
      const parsed = JSON.parse(saved);
      if (parsed.wallets) state.wallets = parsed.wallets;
      if (parsed.brokers) state.brokers = parsed.brokers;
      if (parsed.eth) state.eth = parsed.eth;
      if (parsed.efectivo) state.efectivo = parsed.efectivo;
    }
  } catch(e) {}
}

function saveState() {
  try {
    localStorage.setItem('portfolio_ignacio_v2', JSON.stringify({
      wallets: state.wallets,
      brokers: state.brokers,
      eth: state.eth,
      efectivo: state.efectivo
    }));
  } catch(e) {}
}

// ── RATES ──────────────────────────────────────────────────────────────────
async function fetchRates() {
  const btn = document.getElementById('refreshBtn');
  const overlay = document.getElementById('loadingOverlay');
  btn.classList.add('spinning');
  overlay.classList.add('visible');

  let ok = false;

  try {
    // ETH price in USD via CoinGecko
    const ethRes = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=ethereum&vs_currencies=usd');
    const ethData = await ethRes.json();
    state.rates.ethUsd = ethData.ethereum.usd;

    // Dólar MEP y CCL via DolarAPI
    const dolarRes = await fetch('https://dolarapi.com/v1/dolares');
    const dolarData = await dolarRes.json();
    const mep = dolarData.find(d => d.casa === 'bolsa');
    const ccl = dolarData.find(d => d.casa === 'contadoconliqui');
    if (mep) state.rates.mepArs = mep.venta;
    if (ccl) state.rates.cclArs = ccl.venta;

    ok = true;
  } catch(e) {
    document.getElementById('errorMsg').style.display = 'block';
  }

  btn.classList.remove('spinning');
  overlay.classList.remove('visible');

  updateRatesDisplay();
  renderAll();
  updateTotals();

  document.getElementById('updateTime').innerHTML =
    'Actualizado<br>' + new Date().toLocaleTimeString('es-AR');
}

function updateRatesDisplay() {
  const r = state.rates;
  document.getElementById('ethRateDisplay').textContent =
    r.ethUsd ? `$${r.ethUsd.toLocaleString('en-US')}` : '—';
  document.getElementById('mepRateDisplay').textContent =
    r.mepArs ? `$${r.mepArs.toLocaleString('es-AR')}` : '—';
  document.getElementById('cclRateDisplay').textContent =
    r.cclArs ? `$${r.cclArs.toLocaleString('es-AR')}` : '—';
}

// ── RENDER ─────────────────────────────────────────────────────────────────
function fmtARS(n) {
  return '$ ' + Number(n || 0).toLocaleString('es-AR', {minimumFractionDigits: 0, maximumFractionDigits: 0});
}

function fmtUSD(n) {
  return 'u$s ' + Number(n || 0).toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
}

function createRow(item, type, index) {
  const mepRate = state.rates.mepArs || 1;
  const usd = item.ars / mepRate;

  const row = document.createElement('div');
  row.className = 'row';
  row.id = `row-${item.id}`;

  row.innerHTML = `
    <div class="row-name">
      ${item.name}
    </div>
    <div class="row-right">
      <div>
        <div class="amount-display" id="disp-${item.id}">${fmtARS(item.ars)}</div>
        <div class="amount-sub" id="disp-usd-${item.id}">${fmtUSD(usd)}</div>
      </div>
      <button class="edit-btn" onclick="toggleEdit('${item.id}', '${type}', ${index})" title="Editar">✎</button>
    </div>
    <div class="inline-edit" id="edit-${item.id}">
      <input class="inline-input" id="input-${item.id}" type="number" placeholder="0" value="${item.ars}" step="1" onkeydown="if(event.key==='Enter') saveEdit('${item.id}','${type}',${index})">
      <button class="save-btn" onclick="saveEdit('${item.id}','${type}',${index})">OK</button>
    </div>
  `;
  return row;
}

function createEthRow() {
  const r = state.rates;
  const eth = state.eth.amount;
  const usdVal = r.ethUsd ? eth * r.ethUsd : 0;
  const arsVal = r.mepArs ? usdVal * r.mepArs : 0;

  const row = document.createElement('div');
  row.className = 'row';
  row.id = 'row-eth';
  row.style.flexDirection = 'column';
  row.style.alignItems = 'stretch';
  row.style.gap = '0.3rem';

  row.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center">
      <div class="row-name">
        ETH <span class="badge">Ethereum</span>
      </div>
      <div class="row-right">
        <div>
          <div class="amount-display" id="disp-eth">${usdVal ? fmtUSD(usdVal) : '—'}</div>
          <div class="amount-sub" id="disp-eth-ars">${arsVal ? fmtARS(arsVal) : '—'}</div>
        </div>
        <button class="edit-btn" onclick="toggleEdit('eth','eth',0)" title="Editar ETH">✎</button>
      </div>
    </div>
    <div class="eth-detail" id="eth-detail">
      <span>${eth} ETH</span>
      × ${r.ethUsd ? '$' + r.ethUsd.toLocaleString('en-US') : '—'} USD/ETH
    </div>
    <div class="inline-edit" id="edit-eth">
      <input class="inline-input" id="input-eth" type="number" placeholder="0.0" value="${eth}" step="0.0001" onkeydown="if(event.key==='Enter') saveEdit('eth','eth',0)">
      <button class="save-btn" onclick="saveEdit('eth','eth',0)">OK</button>
    </div>
  `;
  return row;
}

function createEfectivoRow() {
  const r = state.rates;
  const mepRate = r.mepArs || 1;
  const arsTotal = (state.efectivo.ars || 0) + ((state.efectivo.usd || 0) * mepRate);
  const usdTotal = arsTotal / mepRate;

  const wrap = document.createElement('div');
  wrap.id = 'efectivo-wrap';

  // Sub-row pesos
  const rowARS = document.createElement('div');
  rowARS.className = 'row';
  rowARS.innerHTML = `
    <div class="row-name" style="padding-left:0.5rem;color:var(--muted);font-size:0.85rem">
      <span style="color:var(--accent);margin-right:4px">›</span> Pesos
    </div>
    <div class="row-right">
      <div>
        <div class="amount-display" id="disp-ef-ars">${fmtARS(state.efectivo.ars)}</div>
      </div>
      <button class="edit-btn" onclick="toggleEdit('ef-ars','efectivo-ars',0)" title="Editar">✎</button>
    </div>
    <div class="inline-edit" id="edit-ef-ars">
      <input class="inline-input" id="input-ef-ars" type="number" placeholder="0" value="${state.efectivo.ars}" step="1" onkeydown="if(event.key==='Enter') saveEdit('ef-ars','efectivo-ars',0)">
      <button class="save-btn" onclick="saveEdit('ef-ars','efectivo-ars',0)">OK</button>
    </div>
  `;

  // Sub-row dólares
  const rowUSD = document.createElement('div');
  rowUSD.className = 'row';
  const usdInArs = (state.efectivo.usd || 0) * mepRate;
  rowUSD.innerHTML = `
    <div class="row-name" style="padding-left:0.5rem;color:var(--muted);font-size:0.85rem">
      <span style="color:var(--accent2);margin-right:4px">›</span> Dólares
    </div>
    <div class="row-right">
      <div>
        <div class="amount-display" id="disp-ef-usd">${fmtUSD(state.efectivo.usd)}</div>
        <div class="amount-sub" id="disp-ef-usd-ars">${fmtARS(usdInArs)}</div>
      </div>
      <button class="edit-btn" onclick="toggleEdit('ef-usd','efectivo-usd',0)" title="Editar">✎</button>
    </div>
    <div class="inline-edit" id="edit-ef-usd">
      <input class="inline-input" id="input-ef-usd" type="number" placeholder="0" value="${state.efectivo.usd}" step="1" onkeydown="if(event.key==='Enter') saveEdit('ef-usd','efectivo-usd',0)">
      <button class="save-btn" onclick="saveEdit('ef-usd','efectivo-usd',0)">OK</button>
    </div>
  `;

  // Total efectivo row
  const rowTotal = document.createElement('div');
  rowTotal.className = 'row';
  rowTotal.style.background = 'rgba(255,255,255,0.02)';
  rowTotal.innerHTML = `
    <div class="row-name" style="font-weight:700;font-size:0.88rem">Efectivo total</div>
    <div>
      <div class="amount-display" id="disp-ef-total">${fmtARS(arsTotal)}</div>
      <div class="amount-sub" id="disp-ef-total-usd">${fmtUSD(usdTotal)}</div>
    </div>
  `;

  wrap.appendChild(rowARS);
  wrap.appendChild(rowUSD);
  wrap.appendChild(rowTotal);
  return wrap;
}

function updateEfectivoRow() {
  const r = state.rates;
  const mepRate = r.mepArs || 1;
  const usdInArs = (state.efectivo.usd || 0) * mepRate;
  const arsTotal = (state.efectivo.ars || 0) + usdInArs;
  const usdTotal = arsTotal / mepRate;

  const dArs = document.getElementById('disp-ef-ars');
  const dUsd = document.getElementById('disp-ef-usd');
  const dUsdArs = document.getElementById('disp-ef-usd-ars');
  const dTotal = document.getElementById('disp-ef-total');
  const dTotalUsd = document.getElementById('disp-ef-total-usd');

  if (dArs) dArs.textContent = fmtARS(state.efectivo.ars);
  if (dUsd) dUsd.textContent = fmtUSD(state.efectivo.usd);
  if (dUsdArs) dUsdArs.textContent = fmtARS(usdInArs);
  if (dTotal) dTotal.textContent = fmtARS(arsTotal);
  if (dTotalUsd) dTotalUsd.textContent = fmtUSD(usdTotal);
}

function renderAll() {
  const ws = document.getElementById('walletSection');
  const bs = document.getElementById('brokerSection');
  const cs = document.getElementById('cryptoSection');

  ws.innerHTML = '';
  bs.innerHTML = '';
  cs.innerHTML = '';

  state.wallets.forEach((w, i) => ws.appendChild(createRow(w, 'wallet', i)));
  state.brokers.forEach((b, i) => bs.appendChild(createRow(b, 'broker', i)));
  cs.appendChild(createEthRow());

  const es = document.getElementById('efectivoSection');
  es.innerHTML = '';
  es.appendChild(createEfectivoRow());
}

// ── EDIT ───────────────────────────────────────────────────────────────────
let currentEdit = null;

function toggleEdit(id, type, index) {
  // Close previous
  if (currentEdit && currentEdit !== id) {
    document.getElementById(`edit-${currentEdit}`)?.classList.remove('active');
  }
  const editDiv = document.getElementById(`edit-${id}`);
  const isOpen = editDiv.classList.contains('active');
  editDiv.classList.toggle('active', !isOpen);
  if (!isOpen) {
    document.getElementById(`input-${id}`)?.focus();
    currentEdit = id;
  } else {
    currentEdit = null;
  }
}

function saveEdit(id, type, index) {
  const input = document.getElementById(`input-${id}`);
  const val = parseFloat(input.value) || 0;

  if (type === 'wallet') {
    state.wallets[index].ars = val;
    updateRow(state.wallets[index]);
  } else if (type === 'broker') {
    state.brokers[index].ars = val;
    updateRow(state.brokers[index]);
  } else if (type === 'efectivo-ars') {
    state.efectivo.ars = val;
    updateEfectivoRow();
  } else if (type === 'efectivo-usd') {
    state.efectivo.usd = val;
    updateEfectivoRow();
  } else if (type === 'eth') {
    state.eth.amount = val;
    updateEthRow();
  }

  document.getElementById(`edit-${id}`)?.classList.remove('active');
  currentEdit = null;
  saveState();
  updateTotals();
}

function updateRow(item) {
  const mepRate = state.rates.mepArs || 1;
  const usd = item.ars / mepRate;
  document.getElementById(`disp-${item.id}`).textContent = fmtARS(item.ars);
  document.getElementById(`disp-usd-${item.id}`).textContent = fmtUSD(usd);
}

function updateEthRow() {
  const r = state.rates;
  const eth = state.eth.amount;
  const usdVal = r.ethUsd ? eth * r.ethUsd : 0;
  const arsVal = r.mepArs ? usdVal * r.mepArs : 0;
  const dispEth = document.getElementById('disp-eth');
  const dispEthArs = document.getElementById('disp-eth-ars');
  const detail = document.getElementById('eth-detail');
  if (dispEth) dispEth.textContent = usdVal ? fmtUSD(usdVal) : '—';
  if (dispEthArs) dispEthArs.textContent = arsVal ? fmtARS(arsVal) : '—';
  if (detail) detail.innerHTML = `<span>${eth} ETH</span> × ${r.ethUsd ? '$' + r.ethUsd.toLocaleString('en-US') : '—'} USD/ETH`;
}

// ── TOTALS ─────────────────────────────────────────────────────────────────
function updateTotals() {
  const r = state.rates;
  const mepRate = r.mepArs || 1;

  let totalARS = 0;
  state.wallets.forEach(w => totalARS += (w.ars || 0));
  state.brokers.forEach(b => totalARS += (b.ars || 0));
  totalARS += (state.efectivo.ars || 0);
  totalARS += ((state.efectivo.usd || 0) * mepRate);

  // ETH contribution
  const ethUsd = r.ethUsd ? (state.eth.amount * r.ethUsd) : 0;
  const ethArs = ethUsd * mepRate;
  totalARS += ethArs;

  const totalUSD = totalARS / mepRate;

  document.getElementById('totalARS').textContent = fmtARS(totalARS);
  document.getElementById('totalUSD').textContent = fmtUSD(totalUSD);
}

// ── INIT ───────────────────────────────────────────────────────────────────
loadState();
renderAll();
updateTotals();
fetchRates();
</script>
</body>
</html>
